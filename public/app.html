<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MY AI Agent — ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#04040a;--ink2:#0b0b14;--ink3:#11111e;--ink4:#181828;--ink5:#1e1e30;
  --wire:rgba(255,255,255,.055);--wire2:rgba(255,255,255,.10);--wire3:rgba(255,255,255,.18);
  --snow:#f0f0f8;--mist:#7272a0;--fog:#3a3a5a;
  --volt:#c8ff57;--volt-dim:rgba(200,255,87,.1);--volt-glow:rgba(200,255,87,.28);
  --cyan:#00e5cc;--rose:#ff4d6d;--rose-dim:rgba(255,77,109,.12);--amber:#ffb547;
  --sans:'Noto Sans JP',sans-serif;--display:'Bebas Neue',sans-serif;--mono:'DM Mono',monospace;
  --sb:240px;
}
html,body{height:100%;font-family:var(--sans);background:var(--ink);color:var(--snow);-webkit-font-smoothing:antialiased;overflow:hidden;}
button{font-family:var(--sans);cursor:pointer;border:none;transition:all .17s cubic-bezier(.4,0,.2,1);}
input,textarea{font-family:var(--sans);}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--fog);border-radius:2px;}

/* ══════════════════════════════════════
   ROOT LAYOUT
══════════════════════════════════════ */
.layout{display:grid;grid-template-columns:var(--sb) 1fr;height:100vh;overflow:hidden;}

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
.sb{
  background:var(--ink2);border-right:1px solid var(--wire);
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}
/* volt line on right edge */
.sb::after{
  content:'';position:absolute;top:0;right:-1px;width:1px;height:100%;
  background:linear-gradient(to bottom,transparent 0%,var(--volt-glow) 50%,transparent 100%);
  opacity:.5;
}

/* brand */
.sb-brand{
  padding:18px 16px 14px;border-bottom:1px solid var(--wire);
  display:flex;align-items:center;justify-content:space-between;
}
.sb-logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logomark{
  width:30px;height:30px;border-radius:8px;
  background:var(--volt);display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:17px;color:var(--ink);
  box-shadow:0 0 14px var(--volt-glow);
}
.logotext{font-family:var(--display);font-size:15px;letter-spacing:.06em;}

/* new agent button */
.sb-new{
  display:flex;align-items:center;gap:7px;
  padding:9px 12px;border-radius:10px;
  background:var(--volt-dim);border:1px solid rgba(200,255,87,.2);
  color:var(--volt);font-size:12px;font-weight:700;
  margin:12px;transition:all .2s;
}
.sb-new:hover{background:var(--volt);color:var(--ink);border-color:var(--volt);box-shadow:0 0 16px var(--volt-glow);}

/* section label */
.sb-lbl{
  padding:10px 14px 5px;font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--fog);
}

/* agent list */
.ag-list{flex:1;overflow-y:auto;padding:0 6px 6px;}
.ag-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;
  border-radius:10px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;
  transition:all .14s;
}
.ag-item:hover{background:var(--ink3);}
.ag-item.on{background:rgba(200,255,87,.07);border-color:rgba(200,255,87,.2);}
.ag-icon{
  width:34px;height:34px;border-radius:9px;background:var(--ink4);
  border:1px solid var(--wire);display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.ag-item.on .ag-icon{border-color:rgba(200,255,87,.25);}
.ag-meta{min-width:0;flex:1;}
.ag-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-skill{font-size:10px;color:var(--fog);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#28c840;box-shadow:0 0 4px #28c840;flex-shrink:0;}

/* bottom: balance + user */
.sb-bot{padding:10px;border-top:1px solid var(--wire);display:flex;flex-direction:column;gap:8px;}

.balance-card{
  padding:12px;border-radius:10px;
  background:var(--ink3);border:1px solid var(--wire);
}
.balance-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.balance-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fog);}
.balance-val{font-family:var(--mono);font-size:15px;font-weight:500;}
.balance-val.pos{color:var(--volt);}
.balance-val.neg{color:var(--rose);}
.balance-val.warn{color:var(--amber);}
.balance-sub{font-size:10px;color:var(--fog);}
.charge-btn{
  width:100%;padding:7px;border-radius:8px;font-size:12px;font-weight:700;
  background:var(--volt);color:var(--ink);
  box-shadow:0 0 10px var(--volt-glow);margin-top:8px;
}
.charge-btn:hover{box-shadow:0 0 18px var(--volt-glow);}

.sb-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;background:var(--ink3);}
.user-av{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--volt),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--ink);flex-shrink:0;
}
.user-name{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{background:none;color:var(--fog);font-size:11px;padding:0;}
.logout-btn:hover{color:var(--rose);}

/* ══════════════════════════════════════
   MAIN AREA
══════════════════════════════════════ */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--ink);}

/* Empty state */
.empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;text-align:center;padding:2rem;
}
.empty-glyph{
  width:80px;height:80px;border-radius:22px;
  background:var(--ink2);border:1px solid var(--wire2);
  display:flex;align-items:center;justify-content:center;font-size:36px;
  box-shadow:0 0 40px rgba(200,255,87,.05);
}
.empty h2{font-family:var(--display);font-size:32px;letter-spacing:.02em;}
.empty p{font-size:14px;color:var(--mist);line-height:1.7;max-width:280px;}
.btn-volt{
  padding:13px 30px;border-radius:12px;font-size:15px;font-weight:700;
  background:var(--volt);color:var(--ink);
  box-shadow:0 0 20px var(--volt-glow);
}
.btn-volt:hover{transform:translateY(-1px);box-shadow:0 0 32px var(--volt-glow);}

/* Chat */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* topbar */
.chat-top{
  padding:14px 22px;border-bottom:1px solid var(--wire);
  display:flex;align-items:center;gap:14px;flex-shrink:0;
  background:rgba(4,4,10,.8);backdrop-filter:blur(16px);
}
.ct-icon{
  width:40px;height:40px;border-radius:12px;background:var(--ink3);
  border:1px solid var(--wire2);display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.ct-name{font-size:15px;font-weight:700;}
.ct-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;}
.pill{
  padding:2px 9px;border-radius:18px;font-size:10px;font-weight:700;
  background:var(--ink4);color:var(--mist);border:1px solid var(--wire);
  letter-spacing:.02em;
}
.top-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.del-btn{
  width:30px;height:30px;border-radius:8px;background:var(--ink3);
  border:1px solid var(--wire);color:var(--fog);display:flex;align-items:center;justify-content:center;
}
.del-btn:hover{border-color:var(--rose);color:var(--rose);}

/* messages */
.msgs{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:18px;}

.msg{display:flex;gap:10px;align-items:flex-end;animation:msgIn .2s ease;}
.msg.u{flex-direction:row-reverse;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;}}

.mav{
  width:30px;height:30px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
  background:var(--ink3);border:1px solid var(--wire);
}
.mav.ua{
  background:linear-gradient(135deg,var(--volt),var(--cyan));
  border:none;font-size:11px;font-weight:800;color:var(--ink);
}

.mbod{display:flex;flex-direction:column;gap:4px;max-width:72%;}
.msg.u .mbod{align-items:flex-end;}

.mbub{
  padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.7;
  background:var(--ink3);border:1px solid var(--wire2);
  word-break:break-word;
}
.msg.u .mbub{
  background:linear-gradient(135deg,rgba(200,255,87,.9),rgba(0,229,204,.7));
  color:var(--ink);border:none;font-weight:500;
  border-radius:18px 18px 5px 18px;
  box-shadow:0 4px 16px rgba(200,255,87,.15);
}
.msg.a .mbub{border-radius:18px 18px 18px 5px;}

.mtime{font-size:10px;color:var(--fog);padding:0 3px;}

/* thinking */
.tdots{display:flex;gap:4px;align-items:center;padding:4px 0;}
.td{width:6px;height:6px;border-radius:50%;background:var(--fog);animation:tdot 1.4s ease infinite;}
.td:nth-child(2){animation-delay:.18s;}.td:nth-child(3){animation-delay:.36s;}
@keyframes tdot{0%,60%,100%{transform:scale(.8);opacity:.4;}30%{transform:scale(1.3);opacity:1;}}

/* footer */
.chat-foot{
  padding:12px 22px 16px;border-top:1px solid var(--wire);flex-shrink:0;
  background:rgba(4,4,10,.8);backdrop-filter:blur(16px);
}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.chip{
  padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500;
  background:var(--ink3);border:1px solid var(--wire2);color:var(--mist);
}
.chip:hover{border-color:rgba(200,255,87,.35);color:var(--volt);}

.in-box{
  display:flex;gap:9px;align-items:flex-end;
  background:var(--ink3);border:1px solid var(--wire2);
  border-radius:18px;padding:7px 7px 7px 18px;
}
.in-box:focus-within{border-color:rgba(200,255,87,.4);box-shadow:0 0 0 3px rgba(200,255,87,.07);}
#ci{
  flex:1;background:none;border:none;color:var(--snow);font-size:14px;
  resize:none;max-height:120px;line-height:1.6;padding:6px 0;
}
.snd{
  width:38px;height:38px;border-radius:12px;
  background:var(--volt);color:var(--ink);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 12px var(--volt-glow);
}
.snd:hover{transform:scale(1.06);box-shadow:0 0 20px var(--volt-glow);}
.snd:disabled{background:var(--ink4);box-shadow:none;color:var(--fog);}

/* ══════════════════════════════════════
   CREATE MODAL
══════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;z-index:999;
}
.overlay.open{display:flex;}

/* Create wizard */
.wizard{
  width:100%;max-width:540px;margin:0 20px;max-height:90vh;overflow-y:auto;
  background:var(--ink2);border:1px solid var(--wire2);border-radius:24px;
  box-shadow:0 0 0 1px rgba(255,255,255,.04),0 40px 80px rgba(0,0,0,.8);
  animation:wizIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes wizIn{from{opacity:0;transform:scale(.94) translateY(12px);}}

.wiz-top{
  padding:20px 24px 16px;border-bottom:1px solid var(--wire);
  display:flex;align-items:center;justify-content:space-between;
}
.wiz-title{font-family:var(--display);font-size:24px;letter-spacing:.02em;}
.wiz-close{
  width:30px;height:30px;border-radius:8px;background:var(--ink3);
  border:1px solid var(--wire);color:var(--mist);display:flex;align-items:center;justify-content:center;
}
.wiz-close:hover{color:var(--snow);}

.wiz-progress{height:2px;background:var(--wire);position:relative;}
.wiz-fill{height:100%;background:var(--volt);transition:width .4s cubic-bezier(.4,0,.2,1);}

.wiz-body{padding:24px;}

.step-h{font-size:20px;font-weight:700;margin-bottom:6px;}
.step-s{font-size:13px;color:var(--mist);margin-bottom:20px;}

/* avatar grid */
.av-preview{
  width:72px;height:72px;border-radius:20px;
  background:var(--ink3);border:2px solid rgba(200,255,87,.3);
  display:flex;align-items:center;justify-content:center;font-size:36px;
  box-shadow:0 0 0 5px rgba(200,255,87,.06);margin-bottom:12px;
}
.av-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:7px;margin-bottom:20px;}
.av-cell{
  aspect-ratio:1;border-radius:10px;background:var(--ink3);border:2px solid transparent;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .13s;
}
.av-cell:hover{background:var(--ink4);transform:scale(1.1);}
.av-cell.sel{border-color:var(--volt);background:var(--volt-dim);}

/* name input */
.wiz-input{
  width:100%;background:var(--ink3);border:1px solid var(--wire2);
  border-radius:11px;color:var(--snow);font-size:15px;padding:12px 15px;
}
.wiz-input:focus{border-color:var(--volt);outline:none;box-shadow:0 0 0 3px var(--volt-dim);}
::placeholder{color:var(--fog);}

/* skill grid */
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px;}
.sk-card{
  padding:13px;border-radius:12px;background:var(--ink3);
  border:1px solid var(--wire2);cursor:pointer;text-align:left;transition:all .15s;
}
.sk-card:hover{border-color:var(--wire3);}
.sk-card.sel{background:var(--volt-dim);border-color:rgba(200,255,87,.35);}
.sk-ic{font-size:20px;margin-bottom:6px;}
.sk-nm{font-size:12px;font-weight:700;}
.sk-ds{font-size:10px;color:var(--fog);margin-top:2px;line-height:1.4;}

.per-ta{
  width:100%;min-height:80px;background:var(--ink3);border:1px solid var(--wire2);
  border-radius:11px;color:var(--snow);font-size:13px;padding:12px 14px;
  resize:vertical;line-height:1.6;
}
.per-ta:focus{border-color:var(--volt);outline:none;box-shadow:0 0 0 3px var(--volt-dim);}

/* confirm hero */
.conf-hero{
  display:flex;align-items:center;gap:16px;padding:18px;
  background:var(--ink3);border:1px solid var(--wire2);border-radius:16px;margin-bottom:16px;
}
.conf-ic{
  width:60px;height:60px;border-radius:18px;background:var(--ink4);
  border:1px solid rgba(200,255,87,.25);display:flex;align-items:center;justify-content:center;
  font-size:30px;flex-shrink:0;
}
.conf-nm{font-size:19px;font-weight:700;}
.conf-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.conf-per{
  padding:12px 14px;background:var(--ink3);border:1px solid var(--wire);
  border-left:2px solid var(--volt);border-radius:11px;
  font-size:13px;color:var(--mist);line-height:1.6;margin-bottom:16px;
}

.wiz-fld{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.wiz-fld label{font-size:10px;font-weight:700;color:var(--mist);letter-spacing:.06em;text-transform:uppercase;}

.btn-row{display:flex;gap:9px;}
.btn-row .btn-volt{flex:1;border-radius:12px;padding:13px;}
.btn-back{
  padding:12px 20px;border-radius:12px;background:var(--ink3);
  border:1px solid var(--wire2);color:var(--mist);font-size:14px;
}
.btn-back:hover{border-color:var(--wire3);color:var(--snow);}

/* ══════════════════════════════════════
   CHARGE MODAL
══════════════════════════════════════ */
.charge-modal{
  width:100%;max-width:420px;margin:0 20px;
  background:var(--ink2);border:1px solid var(--wire2);border-radius:22px;
  padding:28px;box-shadow:0 40px 80px rgba(0,0,0,.8);
  animation:wizIn .22s cubic-bezier(.34,1.56,.64,1);
}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-ti{font-family:var(--display);font-size:24px;letter-spacing:.02em;}
.plan-g{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px;}
.plan-c{
  padding:14px 10px;border-radius:12px;border:1px solid var(--wire2);
  cursor:pointer;text-align:center;transition:all .15s;
}
.plan-c:hover{border-color:var(--wire3);}
.plan-c.sel{border-color:var(--volt);background:var(--volt-dim);}
.pl-nm{font-size:12px;font-weight:700;margin-bottom:3px;}
.pl-pr{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--volt);}
.pl-ms{font-size:10px;color:var(--fog);margin-top:2px;}
.stripe-note{text-align:center;margin-top:12px;font-size:11px;color:var(--fog);}

/* toast */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  padding:11px 18px;border-radius:12px;
  background:var(--ink3);border:1px solid var(--wire2);color:var(--snow);
  font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
  transform:translateY(70px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);max-width:300px;
}
.toast.on{transform:translateY(0);opacity:1;}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.toast.ok .tdot{background:var(--volt);box-shadow:0 0 6px var(--volt);}
.toast.ng .tdot{background:var(--rose);box-shadow:0 0 6px var(--rose);}

/* loader */
.loader{
  position:fixed;inset:0;background:var(--ink);
  display:flex;align-items:center;justify-content:center;z-index:8888;transition:opacity .3s;
    animation:hideLoader 0s forwards 5s;
}
  @keyframes hideLoader{ to{opacity:0;pointer-events:none;} }
.loader.gone{opacity:0;pointer-events:none;}
.loader-ring{
  width:36px;height:36px;border-radius:50%;
    rder:2px solid var(--wire2);border-top-color:var(--volt);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:700px){
  :root{--sb:0px;}
  .layout{grid-template-columns:1fr;}
  .sb{display:none;}
}
</style>
</head>
<body>

<div class="loader" id="loader"><div class="loader-ring"></div></div>

<div class="layout">
  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sb">
    <div class="sb-brand">
      <a class="sb-logo" href="lp.html">
        <div class="logomark">M</div>
        <span class="logotext">MY AI AGENT</span>
      </a>
    </div>
    <button class="sb-new" onclick="openWizard()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span id="i18n-newAgent">新しいエージェント</span>
    </button>
    <div class="sb-lbl" id="i18n-teamLabel">チーム</div>
    <div class="ag-list" id="agList"></div>
    <div class="sb-bot">
      <div class="balance-card">
        <div class="balance-row">
          <span class="balance-lbl">残高</span>
          <span class="balance-val" id="balVal">¥0.00</span>
        </div>
        <div class="balance-sub" id="balSub">0メッセージ利用</div>
        <button class="charge-btn" onclick="openCharge()">+ 残高チャージ</button>
      </div>
      <div class="sb-user">
        <div class="user-av" id="userAv"></div>
        <div class="user-name" id="userName"></div>
        <button class="logout-btn" onclick="doLogout()">ログアウト</button>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ───────────────────────────────────────────── -->
  <main class="main">
    <div class="empty" id="emptyWrap">
      <div class="empty-glyph">🤖</div>
      <h2 id="i18n-teamTitle">チームを作ろう</h2>
      <p id="i18n-teamSub">専門スキルを持つAIエージェントを作って、仕事を任せましょう。</p>
      <button class="btn-volt" id="i18n-teamBtn" onclick="openWizard()">最初のエージェントを作る →</button>
    </div>
    <div class="chat" id="chatWrap" style="display:none">
      <div class="chat-top" id="chatTop"></div>
      <div class="msgs" id="msgs"></div>
      <div class="chat-foot">
        <div class="chips" id="chips"></div>
        <div class="in-box">
          <textarea id="msgInput" id="ci" placeholder="何をお願いしますか？（Shift+Enterで改行）" rows="1" oninput="exTA(this)" onkeydown="taKey(event)"></textarea>
          <button class="snd" id="sndBtn" onclick="sendMsg()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h12M9 3l6 5-6 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ══ CREATE WIZARD OVERLAY ═══════════════════════════════ -->
<div class="overlay" id="wizOverlay">
  <div class="wizard">
    <div class="wiz-top">
      <div class="wiz-title" id="wizTitle">新しいエージェント</div>
      <button class="wiz-close" onclick="closeWizard()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="wiz-progress"><div class="wiz-fill" id="wizFill" style="width:33%"></div></div>
    <div class="wiz-body">

      <!-- Step 1: Icon & Name -->
      <div id="ws1">
        <div class="step-h">アイコンと名前</div>
        <div class="step-s">エージェントの見た目と名前を決めます</div>
        <div class="av-preview" id="avPrev">🤖</div>
        <div class="av-grid" id="avGrid"></div>
        <div class="wiz-fld">
          <label>エージェントの名前</label>
          <input class="wiz-input" type="text" id="wName" placeholder="例：ライターの田中さん" maxlength="20">
        </div>
        <button class="btn-volt" style="width:100%;border-radius:12px;padding:13px;" onclick="wStep(2)">次へ →</button>
      </div>

      <!-- Step 2: Skills -->
      <div id="ws2" style="display:none">
        <div class="step-h">スキルを与える</div>
        <div class="step-s">このエージェントの得意なこと（複数OK）</div>
        <div class="skill-grid" id="skGrid"></div>
        <div class="wiz-fld">
          <label>性格・追加指示（任意）</label>
          <textarea class="per-ta" id="wPer" placeholder="例：常に丁寧な敬語で話す。専門用語は使わずわかりやすく説明する。"></textarea>
        </div>
        <div class="btn-row">
          <button class="btn-back" onclick="wStep(1)">← 戻る</button>
          <button class="btn-volt" style="border-radius:12px;padding:13px;" onclick="wStep(3)">次へ →</button>
        </div>
      </div>

      <!-- Step 3: Confirm -->
      <div id="ws3" style="display:none">
        <div class="step-h">確認して完成！</div>
        <div class="step-s">このエージェントで作成します</div>
        <div class="conf-hero" id="confHero"></div>
        <div id="confPer"></div>
        <div class="btn-row">
          <button class="btn-back" onclick="wStep(2)">← 戻る</button>
          <button class="btn-volt" id="createBtn" style="border-radius:12px;padding:13px;" onclick="doCreate()">✨ 作成する</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ CHARGE OVERLAY ══════════════════════════════════════ -->
<div class="overlay" id="chargeOverlay">
  <div class="charge-modal">
    <div class="modal-hd">
      <div class="modal-ti">残高チャージ</div>
      <button class="wiz-close" onclick="closeCharge()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="plan-g">
      <div class="plan-c sel" id="c-500" onclick="selCharge(500,this)"><div class="pl-nm">ライト</div><div class="pl-pr">¥500</div><div class="pl-ms">約330回</div></div>
      <div class="plan-c" id="c-1000" onclick="selCharge(1000,this)"><div class="pl-nm">スタンダード</div><div class="pl-pr">¥1,000</div><div class="pl-ms">約670回</div></div>
      <div class="plan-c" id="c-3000" onclick="selCharge(3000,this)"><div class="pl-nm">ヘビー</div><div class="pl-pr">¥3,000</div><div class="pl-ms">約2,000回</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <span style="font-size:13px;color:var(--mist);white-space:nowrap;">または:</span>
      <input type="number" id="customAmt" min="100" max="100000" placeholder="金額を入力 (円)" class="wiz-input" style="flex:1;" oninput="selCharge(parseInt(this.value)||0,null)">
      <span style="font-size:13px;color:var(--mist);">円</span>
    </div>
    <div class="wiz-fld"><label>カード番号</label><input type="text" class="wiz-input" placeholder="4242 4242 4242 4242" maxlength="19" oninput="fmtCard(this)"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px;">
      <div class="wiz-fld"><label>有効期限</label><input type="text" class="wiz-input" placeholder="MM / YY" maxlength="7" oninput="fmtExp(this)"></div>
      <div class="wiz-fld"><label>CVC</label><input type="text" class="wiz-input" placeholder="123" maxlength="3"></div>
    </div>
    <button class="btn-volt" id="chargeBtn" style="width:100%;border-radius:12px;padding:14px;font-size:15px;" onclick="doCharge()">チャージする</button>
    <div class="stripe-note">🔒 Stripe による安全な決済（現在デモモード）</div>
  </div>
</div>

<div class="toast" id="toast"><div class="tdot"></div><span id="toastMsg"></span></div>

<script src="app.js"></script>
</body>
</html>
