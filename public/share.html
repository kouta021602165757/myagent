<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>MY AI AGENT — 共有エージェント</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{
  --cream:#fdf8f3; --cream2:#faf3eb; --cream3:#f5ebe0; --cream4:#ede0d4;
  --wire:rgba(180,120,80,.1); --wire2:rgba(180,120,80,.2); --wire3:rgba(180,120,80,.3);
  --peach:#fb923c; --peach-dark:#ea580c;
  --text:#2d1a0e; --text2:#6b4226; --text3:#9a6a4a;
  --green:#10b981; --rose:#ef4444; --blue:#3b82f6;
  --sans:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--sans);background:var(--cream);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

.page{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:24px 20px 60px;
}

.brand{display:flex;align-items:center;gap:8px;margin-bottom:32px;text-decoration:none;color:var(--text);}
.brand .bars{display:flex;gap:3px;align-items:flex-end;}
.brand .bar{width:4px;background:#fb923c;border-radius:2px;}
.brand .bar1{height:18px;}.brand .bar2{height:12px;opacity:.65;}.brand .bar3{height:7px;opacity:.35;}
.brand-name{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--text);}

.card{
  width:100%;max-width:520px;background:#fff;border:1px solid var(--wire2);border-radius:20px;
  padding:32px 28px 28px;box-shadow:0 12px 30px rgba(0,0,0,.08);text-align:center;
}

.banner{font-size:11px;font-weight:700;color:var(--peach-dark);background:rgba(251,146,60,.1);
  border:1px solid rgba(251,146,60,.25);padding:5px 12px;border-radius:999px;display:inline-block;margin-bottom:18px;letter-spacing:.04em;}

.av{
  width:80px;height:80px;border-radius:22px;
  background:linear-gradient(135deg,var(--peach),var(--peach-dark));color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:40px;
  margin:0 auto 16px;box-shadow:0 6px 18px rgba(251,146,60,.25);
}
.name{font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px;}
.owner{font-size:12px;color:var(--text3);margin-bottom:18px;}
.pills{display:flex;justify-content:center;flex-wrap:wrap;gap:5px;margin-bottom:20px;}
.pill{
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;
  background:var(--cream3);color:var(--text2);border:1px solid var(--wire2);letter-spacing:.02em;
}
.pill.chrome{background:rgba(59,130,246,.1);color:var(--blue);border-color:rgba(59,130,246,.25);}
.persona{
  text-align:left;background:var(--cream2);border:1px solid var(--wire2);border-radius:12px;
  padding:14px 16px;font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px;
  white-space:pre-wrap;max-height:260px;overflow-y:auto;
}
.persona b{color:var(--peach-dark);font-weight:700;}

.cta{
  display:block;width:100%;padding:14px;background:var(--peach);color:#fff;border:0;
  border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;
  transition:all .14s;margin-bottom:10px;
}
.cta:hover{background:var(--peach-dark);transform:translateY(-1px);box-shadow:0 8px 18px rgba(251,146,60,.3);}
.cta:disabled{opacity:.6;cursor:wait;transform:none;}

.cta-sub{font-size:11.5px;color:var(--text3);line-height:1.6;}
.cta-sub a{color:var(--peach-dark);text-decoration:underline;}

.err{
  text-align:center;color:var(--rose);font-size:14px;
  background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);
  padding:14px;border-radius:12px;
}

.loader{display:flex;justify-content:center;gap:6px;padding:30px;}
.loader span{width:8px;height:8px;border-radius:50%;background:var(--peach);animation:bounce 1.2s ease infinite;}
.loader span:nth-child(2){animation-delay:.15s;}.loader span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,100%{transform:scale(.6);opacity:.4;}50%{transform:scale(1.1);opacity:1;}}

.tag-line{margin-top:24px;font-size:11px;color:var(--text3);text-align:center;line-height:1.7;}
</style>
</head>
<body>
<div class="page">
  <a href="/" class="brand">
    <div class="bars">
      <div class="bar bar1"></div>
      <div class="bar bar2"></div>
      <div class="bar bar3"></div>
    </div>
    <div class="brand-name">MY AI AGENT</div>
  </a>

  <div class="card" id="card">
    <div class="loader"><span></span><span></span><span></span></div>
  </div>

  <div class="tag-line">
    🌍 SNS でシェアされた AI エージェントを試して、自分のアカウントに保存できます。<br>
    Built on <a href="/" style="color:var(--peach-dark);text-decoration:underline">MY AI AGENT</a> · クリエイターは従量課金の10%を報酬として受け取れます（リリース後）
  </div>
</div>

<script>
const API = location.origin;

// Extract share_id from /a/{share_id}
const shareId = (location.pathname.match(/^\/a\/([a-z0-9-]+)\/?$/)||[])[1];

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const SKILL_LABELS = {
  writing:'ライティング', research:'リサーチ', coding:'プログラミング',
  marketing:'マーケティング', planning:'プランニング', analysis:'データ分析',
  translate:'翻訳', support:'カスタマー対応', idea:'アイデア出し', teaching:'教育・解説',
  ceo:'アシスタントCEO', coo:'アシスタントCOO', secretary:'秘書',
  designer:'デザイナー', sns:'SNS担当', other:'その他'
};

async function main(){
  const card = document.getElementById('card');
  if(!shareId){
    card.innerHTML = '<div class="err">URL の形式が正しくありません</div>';
    return;
  }
  let data;
  try{
    const res = await fetch(API+'/api/share/'+shareId);
    data = await res.json();
    if(!res.ok) throw new Error(data.error||'取得に失敗しました');
  }catch(e){
    card.innerHTML = '<div class="err">'+esc(e.message||'共有エージェントが見つかりません')+'</div>';
    return;
  }

  const ag = data.agent;
  const owner = data.owner;
  const skillsHtml = (ag.skills||[]).map(s=>'<span class="pill">'+esc(SKILL_LABELS[s]||s)+'</span>').join('')
    + (ag.chrome_enabled?'<span class="pill chrome">🌐 Google Chrome</span>':'');
  const personaHtml = ag.persona
    ? '<div class="persona">'+esc(ag.persona).replace(/\n/g,'<br>').replace(/採用目的:/g,'<b>採用目的:</b>').replace(/業務内容:/g,'<b>業務内容:</b>')+'</div>'
    : '';

  card.innerHTML =
    '<div class="banner">🔗 共有された AI エージェント</div>'+
    '<div class="av">'+esc(ag.avatar||'🤖')+'</div>'+
    '<div class="name">'+esc(ag.name||'')+'</div>'+
    '<div class="owner">作成者: '+esc(owner.name||'ユーザー')+'</div>'+
    '<div class="pills">'+skillsHtml+'</div>'+
    personaHtml+
    '<button class="cta" id="useBtn" onclick="useAgent()">このエージェントを使う →</button>'+
    '<div class="cta-sub">クリックすると、このエージェントを <b>あなたのアカウント</b> にコピーします。<br>未ログインの場合は、簡単サインアップ後に自動でコピーされます。</div>';
}

async function useAgent(){
  const btn = document.getElementById('useBtn');
  btn.disabled = true;
  btn.textContent = '処理中…';
  const token = localStorage.getItem('token');
  if(!token){
    // Save destination so we can resume after auth
    sessionStorage.setItem('post_auth_share', shareId);
    location.href = '/auth.html?next=/a/'+shareId;
    return;
  }
  try{
    const res = await fetch(API+'/api/share/'+shareId+'/clone',{
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:'{}'
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'追加に失敗しました');
    btn.textContent = '✓ 追加しました — 開いています...';
    setTimeout(()=>{ location.href = '/app.html'; }, 600);
  }catch(e){
    btn.disabled = false;
    btn.textContent = 'このエージェントを使う →';
    alert(e.message||'追加に失敗しました');
  }
}

main();

// If returning from auth flow, auto-clone and proceed
window.addEventListener('load', ()=>{
  const pending = sessionStorage.getItem('post_auth_share');
  const token = localStorage.getItem('token');
  if(pending===shareId && token){
    sessionStorage.removeItem('post_auth_share');
    setTimeout(()=>{ const b=document.getElementById('useBtn'); if(b) b.click(); }, 800);
  }
});
</script>
</body>
</html>
